services:
  postgres:
    image: postgres:16-alpine
    container_name: glytrack-postgres
    environment:
      POSTGRES_DB: glytrack
      POSTGRES_USER: glytrack
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - glytrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U glytrack" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  glytrack-postgres-data:
